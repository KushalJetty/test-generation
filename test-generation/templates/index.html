<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test-case generator - AI-Powered Test Automation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Test-case generator</h1>
            <p>AI-Powered Test Automation Platform</p>
        </header>
        
        <div class="main-content">
            <div class="card">
                <h2>Test Recorder</h2>
                <p>Record user interactions and generate automated tests</p>
                
                <div class="form-group">
                    <label for="urlInput">Website URL:</label>
                    <input type="text" id="urlInput" placeholder="https://example.com">
                </div>
                
                <div class="button-group">
                    <button id="startRecordingBtn" class="btn primary">Start Recording</button>
                    <button id="stopRecordingBtn" class="btn secondary" disabled>Stop Recording</button>
                </div>
                
                <div class="test-generation" style="margin-top: 20px; display: none;">
                    <h3>Generate Test Code</h3>
                    <div class="form-group">
                        <label for="testNameInput">Test Name:</label>
                        <input type="text" id="testNameInput" value="RecordedTest">
                    </div>
                    <div class="button-group">
                        <button id="generateSeleniumBtn" class="btn primary">Generate Selenium Test</button>
                        <button id="generatePlaywrightBtn" class="btn primary">Generate Playwright Test</button>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h2>AI Test Generation</h2>
                <p>Generate tests automatically from a URL</p>
                
                <div class="form-group">
                    <label for="aiUrlInput">Website URL:</label>
                    <input type="text" id="aiUrlInput" placeholder="https://example.com">
                </div>
                
                <div class="form-group">
                    <label>Test Types:</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="testType" value="functional" checked> Functional</label>
                        <label><input type="checkbox" name="testType" value="ui" checked> UI</label>
                        <label><input type="checkbox" name="testType" value="accessibility"> Accessibility</label>
                    </div>
                </div>
                
                <button id="generateTestsBtn" class="btn primary">Generate Tests</button>
            </div>
        </div>
        
        <div id="resultsContainer" class="results-container" style="display: none;">
            <h2>Generated Tests</h2>
            <div id="testResults"></div>
        </div>
        
        <div id="recordedActionsContainer" class="results-container" style="display: none;">
            <h2>Recorded Actions</h2>
            <div id="actionsList" class="action-list"></div>
        </div>
    </div>
    
    <script>
        $(document).ready(function() {
            let isRecording = false;
            let actionsRefreshInterval = null;
            
            // Start recording button
            $('#startRecordingBtn').click(function() {
                const url = $('#urlInput').val();
                if (!url) {
                    alert('Please enter a valid URL');
                    return;
                }
                
                // Disable button during API call
                $(this).prop('disabled', true).text('Starting...');
                
                $.ajax({
                    url: '/api/start-recording',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ url: url }),
                    success: function(response) {
                        if (response.success) {
                            console.log('Recording started successfully');
                            isRecording = true;
                            $('#startRecordingBtn').text('Recording...').prop('disabled', true);
                            $('#stopRecordingBtn').prop('disabled', false);
                            $('.test-generation').show();
                            $('#recordedActionsContainer').show();
                            
                            // Start refreshing actions list
                            refreshActions();
                            actionsRefreshInterval = setInterval(refreshActions, 2000);
                        } else {
                            alert('Error: ' + response.error);
                            $('#startRecordingBtn').prop('disabled', false).text('Start Recording');
                        }
                    },
                    error: function(xhr) {
                        alert('Error starting recording: ' + xhr.responseJSON?.error || 'Unknown error');
                        $('#startRecordingBtn').prop('disabled', false).text('Start Recording');
                    }
                });
            });
            
            // Stop recording button
            $('#stopRecordingBtn').click(function() {
                $(this).prop('disabled', true).text('Stopping...');
                
                $.ajax({
                    url: '/api/stop-recording',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({}),
                    success: function(response) {
                        if (response.success) {
                            console.log('Recording stopped successfully');
                            isRecording = false;
                            $('#startRecordingBtn').text('Start Recording').prop('disabled', false);
                            $('#stopRecordingBtn').text('Stop Recording').prop('disabled', true);
                            
                            // Stop refreshing actions
                            if (actionsRefreshInterval) {
                                clearInterval(actionsRefreshInterval);
                                actionsRefreshInterval = null;
                            }
                            
                            // Final refresh of actions
                            refreshActions();
                        } else {
                            alert('Error: ' + response.error);
                        }
                    },
                    error: function(xhr) {
                        alert('Error stopping recording: ' + xhr.responseJSON?.error || 'Unknown error');
                    },
                    complete: function() {
                        $('#stopRecordingBtn').text('Stop Recording');
                    }
                });
            });
            
            // Generate Selenium test
            $('#generateSeleniumBtn').click(function() {
                const testName = $('#testNameInput').val() || 'RecordedTest';
                $(this).prop('disabled', true).text('Generating...');
                
                $.ajax({
                    url: '/api/generate-selenium-test',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ test_name: testName }),
                    success: function(response) {
                        if (response.success) {
                            // Display the generated test
                            $('#resultsContainer').show();
                            $('#testResults').html(`
                                <div class="test-item">
                                    <h3>Selenium Test: ${testName}</h3>
                                    <pre class="code-block"><code>${response.test_code}</code></pre>
                                    <button class="btn copy-btn" onclick="copyToClipboard('${testName}-selenium')">Copy Code</button>
                                </div>
                            `);
                            
                            // Create a hidden textarea for copying
                            $('body').append(`<textarea id="${testName}-selenium" style="position:absolute;left:-9999px;">${response.test_code}</textarea>`);
                        } else {
                            alert('Error: ' + response.error);
                        }
                    },
                    error: function(xhr) {
                        alert('Error generating test: ' + xhr.responseJSON?.error || 'Unknown error');
                    },
                    complete: function() {
                        $('#generateSeleniumBtn').prop('disabled', false).text('Generate Selenium Test');
                    }
                });
            });
            
            // Generate Playwright test
            $('#generatePlaywrightBtn').click(function() {
                const testName = $('#testNameInput').val() || 'RecordedTest';
                $(this).prop('disabled', true).text('Generating...');
                
                $.ajax({
                    url: '/api/generate-playwright-test',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ test_name: testName }),
                    success: function(response) {
                        if (response.success) {
                            // Display the generated test
                            $('#resultsContainer').show();
                            $('#testResults').html(`
                                <div class="test-item">
                                    <h3>Playwright Test: ${testName}</h3>
                                    <pre class="code-block"><code>${response.test_code}</code></pre>
                                    <button class="btn copy-btn" onclick="copyToClipboard('${testName}-playwright')">Copy Code</button>
                                </div>
                            `);
                            
                            // Create a hidden textarea for copying
                            $('body').append(`<textarea id="${testName}-playwright" style="position:absolute;left:-9999px;">${response.test_code}</textarea>`);
                        } else {
                            alert('Error: ' + response.error);
                        }
                    },
                    error: function(xhr) {
                        alert('Error generating test: ' + xhr.responseJSON?.error || 'Unknown error');
                    },
                    complete: function() {
                        $('#generatePlaywrightBtn').prop('disabled', false).text('Generate Playwright Test');
                    }
                });
            });
            
            // Generate AI tests button
            $('#generateTestsBtn').click(function() {
                const url = $('#aiUrlInput').val();
                if (!url) {
                    alert('Please enter a valid URL');
                    return;
                }
                
                // Get selected test types
                const testTypes = [];
                $('input[name="testType"]:checked').each(function() {
                    testTypes.push($(this).val());
                });
                
                // Disable button during API call
                $(this).prop('disabled', true).text('Generating...');
                
                $.ajax({
                    url: '/api/generate-tests',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ 
                        url: url,
                        test_types: testTypes
                    }),
                    success: function(response) {
                        // Display results
                        $('#resultsContainer').show();
                        
                        // Format and display test results
                        let resultsHtml = '';
                        if (response.tests && response.tests.length > 0) {
                            resultsHtml += '<div class="test-list">';
                            response.tests.forEach(function(test, index) {
                                resultsHtml += `
                                    <div class="test-item">
                                        <h3>Test ${index + 1}: ${test.name || 'Unnamed Test'}</h3>
                                        <p>${test.description || 'No description'}</p>
                                        <pre>${test.code || 'No code generated'}</pre>
                                    </div>
                                `;
                            });
                            resultsHtml += '</div>';
                        } else {
                            resultsHtml = '<p>No tests generated. Try a different URL or test types.</p>';
                        }
                        
                        $('#testResults').html(resultsHtml);
                    },
                    error: function(xhr) {
                        alert('Error generating tests: ' + xhr.responseJSON?.error || 'Unknown error');
                    },
                    complete: function() {
                        $('#generateTestsBtn').prop('disabled', false).text('Generate Tests');
                    }
                });
            });
            
            // Function to refresh actions list
            function refreshActions() {
                $.ajax({
                    url: '/api/get-actions',
                    method: 'GET',
                    success: function(response) {
                        if (response.success && response.actions) {
                            renderActions(response.actions);
                        }
                    },
                    error: function(xhr) {
                        console.error('Error fetching actions:', xhr);
                    }
                });
            }
            
            // Function to render actions list
            function renderActions(actions) {
                const actionsList = $('#actionsList');
                actionsList.empty();
                
                if (actions.length === 0) {
                    actionsList.html('<p>No actions recorded yet.</p>');
                    return;
                }
                
                const actionsHtml = actions.map((action, index) => {
                    let actionText = `${index + 1}. ${action.type}`;
                    if (action.selector) actionText += ` - ${action.selector}`;
                    if (action.value) actionText += ` - ${action.value}`;
                    if (action.url) actionText += ` - ${action.url}`;
                    
                    return `<div class="action-item">${actionText}</div>`;
                }).join('');
                
                actionsList.html(actionsHtml);
            }
            
            // Function to copy text to clipboard
            window.copyToClipboard = function(elementId) {
                const textarea = document.getElementById(elementId);
                if (!textarea) {
                    console.error('Textarea not found:', elementId);
                    return;
                }
                textarea.select();
                try {
                    document.execCommand('copy');
                    const button = document.querySelector(`button[onclick="copyToClipboard('${elementId}')"]`);
                    if (button) {
                        const originalText = button.textContent;
                        button.textContent = 'Copied!';
                        setTimeout(() => {
                            button.textContent = originalText;
                        }, 2000);
                    }
                } catch (err) {
                    console.error('Failed to copy text:', err);
                    alert('Failed to copy code. Please try again.');
                }
            };
        });
    </script>
</body>
</html>
