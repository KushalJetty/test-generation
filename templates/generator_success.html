<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Cases Generated - StreamzAI Test Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">Test Cases Generated Successfully</h5>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-success">
                            <i class="bi bi-check-circle"></i> Test cases have been generated successfully for test suite: <strong>{{ test_suite.name }}</strong>
                        </div>
                        <p>You can now:</p>
                        <ul>
                            <li>View the generated test cases in the main application</li>
                            <li>Run the test cases using the test runner</li>
                            <li>Generate more test cases if needed</li>
                        </ul>
                        <div class="mt-3">
                            <a href="http://localhost:5050/test-suite/{{ test_suite.id }}" class="btn btn-primary">
                                <i class="bi bi-arrow-left"></i> Back to Test Suite
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
