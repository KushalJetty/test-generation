<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CogniTest - AI-Powered Testing Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container { max-width: 900px; }
        .result-container { max-height: 500px; overflow-y: auto; }
        .recording-indicator { color: red; display: none; }
        .recording .recording-indicator { display: inline; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">CogniTest <span class="recording-indicator">● Recording</span></h1>
        <h3 class="mb-4">AI-Powered Testing Platform</h3>
        
        <div class="card mb-4">
            <div class="card-header">
                Generate Tests
            </div>
            <div class="card-body">
                <form id="testForm">
                    <div class="mb-3">
                        <label for="urlInput" class="form-label">Website URL</label>
                        <input type="url" class="form-control" id="urlInput" placeholder="https://example.com" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Test Types</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="functional" id="functionalCheck" checked>
                            <label class="form-check-label" for="functionalCheck">
                                Functional Tests
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="ui" id="uiCheck" checked>
                            <label class="form-check-label" for="uiCheck">
                                UI Tests
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="accessibility" id="accessibilityCheck">
                            <label class="form-check-label" for="accessibilityCheck">
                                Accessibility Tests
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="security" id="securityCheck">
                            <label class="form-check-label" for="securityCheck">
                                Security Tests
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="performance" id="performanceCheck">
                            <label class="form-check-label" for="performanceCheck">
                                Performance Tests
                            </label>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Generate Tests</button>
                </form>
            </div>
        </div>
        
        <div class="card mb-4">
            <div class="card-header">
                Record Selenium Tests
            </div>
            <div class="card-body">
                <form id="recordingForm">
                    <div class="mb-3">
                        <label for="recordUrlInput" class="form-label">Website URL</label>
                        <input type="url" class="form-control" id="recordUrlInput" placeholder="https://example.com" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="testNameInput" class="form-label">Test Name</label>
                        <input type="text" class="form-control" id="testNameInput" placeholder="MyTestCase" value="AutoGeneratedTest">
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="button" id="startRecordingBtn" class="btn btn-success">Start Recording</button>
                        <button type="button" id="stopRecordingBtn" class="btn btn-danger" disabled>Stop Recording</button>
                        <button type="button" id="generateSeleniumBtn" class="btn btn-primary" disabled>Generate Selenium Test</button>
                    </div>
                </form>
            </div>
        </div>
        
        <div class="card d-none" id="resultsCard">
            <div class="card-header">
                Generated Tests
            </div>
            <div class="card-body result-container">
                <pre id="resultsOutput" class="bg-light p-3 rounded"></pre>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const url = document.getElementById('urlInput').value;
            const testTypes = Array.from(document.querySelectorAll('input[type="checkbox"]:checked'))
                .map(checkbox => checkbox.value);
            
            if (!url) {
                alert('Please enter a valid URL');
                return;
            }
            
            document.querySelector('button[type="submit"]').disabled = true;
            document.querySelector('button[type="submit"]').innerHTML = 'Generating...';
            
            try {
                const response = await fetch('/api/generate-tests', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url, test_types: testTypes })
                });
                
                const data = await response.json();
                
                document.getElementById('resultsOutput').textContent = JSON.stringify(data, null, 2);
                document.getElementById('resultsCard').classList.remove('d-none');
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred while generating tests');
            } finally {
                document.querySelector('button[type="submit"]').disabled = false;
                document.querySelector('button[type="submit"]').innerHTML = 'Generate Tests';
            }
        });
        
        // Recording functionality
        const startRecordingBtn = document.getElementById('startRecordingBtn');
        const stopRecordingBtn = document.getElementById('stopRecordingBtn');
        const generateSeleniumBtn = document.getElementById('generateSeleniumBtn');
        
        startRecordingBtn.addEventListener('click', async function() {
            const url = document.getElementById('recordUrlInput').value;
            
            if (!url) {
                alert('Please enter a valid URL');
                return;
            }
            
            try {
                const response = await fetch('/api/start-recording', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.body.classList.add('recording');
                    startRecordingBtn.disabled = true;
                    stopRecordingBtn.disabled = false;
                    alert('Recording started. Perform actions in the opened browser window.');
                } else {
                    alert('Failed to start recording: ' + data.message);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred while starting recording');
            }
        });
        
        stopRecordingBtn.addEventListener('click', async function() {
            try {
                const response = await fetch('/api/stop-recording', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.body.classList.remove('recording');
                    startRecordingBtn.disabled = false;
                    stopRecordingBtn.disabled = true;
                    generateSeleniumBtn.disabled = false;
                    alert('Recording stopped.');
                } else {
                    alert('Failed to stop recording: ' + data.message);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred while stopping recording');
            }
        });
        
        generateSeleniumBtn.addEventListener('click', async function() {
            const testName = document.getElementById('testNameInput').value || 'AutoGeneratedTest';
            
            try {
                const response = await fetch('/api/generate-selenium-test', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ test_name: testName })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('resultsOutput').textContent = data.test_code;
                    document.getElementById('resultsCard').classList.remove('d-none');
                    generateSeleniumBtn.disabled = true;
                } else {
                    alert('Failed to generate Selenium test: ' + data.message);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred while generating Selenium test');
            }
        });
    </script>
</body>
</html>
