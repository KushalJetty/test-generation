<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test Case Recorder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .modal-footer .btn {
            margin: 2px;
            min-width: 120px;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            scroll-behavior: smooth;
        }

        .autoscroll {
            overflow-anchor: none;
        }
    </style>
</head>
<body class="bg-light p-5">

<div class="container text-center">
    <h2 class="mb-4">StreamzAI Test Generator</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#recordModal">Record Test Case</button>
</div>

<!-- Modal -->
<div class="modal fade" id="recordModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Record Browser Actions</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <!-- URL Input Field -->
                <div class="mb-3">
                    <label for="urlInput" class="form-label">Enter URL to Test</label>
                    <input type="text" id="urlInput" class="form-control" placeholder="https://example.com">
                </div>

                <!-- Recording Info -->
                <div class="row">
                    <div class="col-md-6">
                        <h6>Recorded Actions</h6>
                        <pre id="recordedActions" class="bg-light border p-2 rounded" style="height: 200px; overflow: auto;"></pre>
                    </div>
                    <div class="col-md-6">
                        <h6>Generated Playwright Code</h6>
                        <pre id="generatedCode" class="bg-light border p-2 rounded" style="height: 200px; overflow: auto;"></pre>
                    </div>
                </div>
            </div>

            <div class="modal-footer justify-content-center">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button class="btn btn-danger" onclick="stopRecording()">⏹ Stop Recording</button>
                <button class="btn btn-warning" onclick="clearRecordedActions()">⎌ Clear Actions</button>
                <button class="btn btn-primary" onclick="startRecording()">🔴 Start Recording</button>
                <button class="btn btn-success" onclick="saveTestCase()">💾 Save Test Case</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const eventSource = new EventSource('/stream');
const recordedActions = document.getElementById("recordedActions");
const codePreview = document.querySelector("#generatedCode");

eventSource.onmessage = function(e) {
    const data = JSON.parse(e.data);
    if (data.type === 'clear') {
        recordedActions.textContent = '';
        codePreview.textContent = '';
    }
    if (data.type === 'action') {
        const currentContent = recordedActions.textContent;
        recordedActions.textContent = currentContent + JSON.stringify(data.data, null, 2) + ',\n';
    }
    if (data.type === 'code') {
        codePreview.textContent = data.data;
    }
};


    async function startRecording() {
        const url = document.getElementById("urlInput").value;
        if (!url) return alert("Please enter a URL first.");
        
        try {
            await fetch("/start-recording", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url: url })
            });
        } catch (error) {
            console.error('Error starting recording:', error);
        }
    }

async function stopRecording() {
try {
    const response = await fetch("/stop-recording", { method: "POST" });
    const data = await response.json();
    
    if (data.steps) {
        recordedActions.textContent = JSON.stringify(data.steps, null, 2);
    }
    if (data.code) {
        codePreview.textContent = data.code;
    }
} catch (error) {
    console.error('Error stopping recording:', error);
}
}


async function saveTestCase() {
    await stopRecording();
    const codeContent = codePreview.textContent;
    
    try {
        const handle = await window.showSaveFilePicker({
            suggestedName: 'test_case.py',
            types: [{
                description: 'Python Files',
                accept: {'text/python': ['.py']}
            }]
        });
        
        const writable = await handle.createWritable();
        await writable.write(codeContent);
        await writable.close();
        alert('Test case saved successfully!');
    } catch (err) {
        if (err.name !== 'AbortError') {
            console.error('Error saving file:', err);
            // Fallback for browsers without File System Access API
            const blob = new Blob([codeContent], {type: 'text/python'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'test_case.py';
            a.click();
        }
    }
}

async function clearRecordedActions() {
    try {
        // Clear UI
        document.getElementById("recordedActions").textContent = '';
        document.getElementById("generatedCode").textContent = '';
        
        // Clear server-side data
        await fetch("/clear-recording", {
            method: "POST"
        });
        
        // Clear URL input
        document.getElementById("urlInput").value = '';
    } catch (error) {
        console.error('Error clearing actions:', error);
    }
}
</script>
</body>
</html>
